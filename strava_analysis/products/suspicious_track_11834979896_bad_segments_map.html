const map = L.map('map', { preferCanvas: true });
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19,
  attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);
L.tileLayer('https://tiles.opentopomap.org/{z}/{x}/{y}.png', {
  maxZoom: 17,
  opacity: 0.45,
  attribution: 'SRTM | OpenTopoMap'
}).addTo(map);
map.fitBounds(summary.bounds, { padding: [36, 36] });

L.polyline(track, { color: '#2563eb', weight: 3, opacity: 0.82 }).addTo(map)
  .bindPopup(`<b>Full track</b><br>${summary.name}<br>${summary.distance_mi} mi`);
L.circleMarker(track[0], { radius: 5, color: '#16a34a', fillColor: '#16a34a', fillOpacity: 0.95 }).addTo(map).bindPopup('Start');
L.circleMarker(track[track.length - 1], { radius: 5, color: '#111827', fillColor: '#111827', fillOpacity: 0.95 }).addTo(map).bindPopup('End');

const layerBySegment = new Map();
for (const seg of badSegments) {
  const popup = `<b>Bad segment ${seg.segment_index}</b><table>` +
    `<tr><td>Slope</td><td><b>${seg.slope} deg</b></td></tr>` +
    `<tr><td>Speed</td><td><b>${seg.speed} mph</b></td></tr>` +
    `<tr><td>Rise</td><td><b>${seg.rise_ft} ft / 40 m</b></td></tr>` +
    `<tr><td>Elevation</td><td>${seg.elev_ft} ft</td></tr>` +
    `<tr><td>Elapsed</td><td>${seg.elapsed} sec</td></tr>` +
    `<tr><td>Start</td><td>${seg.start_time}</td></tr>` +
    `</table>`;
  const line = L.polyline(seg.coords, { color: '#dc2626', weight: 8, opacity: 0.95 }).addTo(map).bindPopup(popup);
  L.circleMarker(seg.coords[0], { radius: 4, color: '#991b1b', fillColor: '#f97316', fillOpacity: 0.9, weight: 2 }).addTo(map).bindPopup(popup);
  layerBySegment.set(seg.segment_index, line);
}

const list = document.getElementById('badList');
for (const seg of badSegments.slice(0, 24)) {
  const btn = document.createElement('button');
  btn.textContent = `#${seg.segment_index}: ${seg.slope} deg, ${seg.speed} mph, ${seg.rise_ft} ft`;
  btn.addEventListener('click', () => {
    const layer = layerBySegment.get(seg.segment_index);
    map.fitBounds(layer.getBounds(), { maxZoom: 17, padding: [120, 120] });
    layer.openPopup();
  });
  list.appendChild(btn);
}
